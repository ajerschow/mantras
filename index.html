ི",wylie:"badz+rI",phon:"benzri",note:"The familiar 'vajra' cluster (root བ 'ba' with ཛ 'dza' and ར 'ra' subjoined) plus the long-vowel sign ཱི (a combination of ཱ and ི giving long 'ī') on top — together 'vajrī' = 'vajra-holder' (vajra + the possessive suffix -in). The following བྷ begins with བྷ and does not change this syllable's sound."},{tib:"བྷ",wylie:"b+ha",phon:"bha",note:"The voiced-aspirate letter བྷ with inherent vowel 'a': 'bha'. Begins bhava, 'be!'. The following ཝ begins with ཝ and does not change this syllable's sound."},{tib:"ཝ",wylie:"wa",phon:"wa",note:"Root letter ཝ (wa) with inherent vowel 'a': 'wa'. Together བྷ་ཝ = 'bhava' = 'be!'; 'vajrī bhava' = 'be the vajra-holder!'. The following མ begins with མ and does not change this syllable's sound."},{tib:"མ",wylie:"ma",phon:"ma",note:"Root letter མ (ma) with inherent vowel 'a': 'ma'. Begins mahā, 'great'. The following ཧཱ begins with ཧ and does not change this syllable's sound."},{tib:"ཧཱ",wylie:"hA",phon:"ha",note:"Root letter ཧ (ha) with the long-vowel sign ཱ: 'hā'. Combined with the preceding ma, this gives 'mahā' = 'great'. The following ས begins with ས and does not change this syllable's sound."},{tib:"ས",wylie:"sa",phon:"sa",note:"Root letter ས (sa) with inherent vowel 'a': 'sa'. Begins samaya, 'pledge'. The following མ begins with མ and does not change this syllable's sound."},{tib:"མ",wylie:"ma",phon:"ma",note:"Root letter མ (ma) with inherent vowel 'a': 'ma'. The following ཡ begins with ཡ and does not change this syllable's sound."},{tib:"ཡ",wylie:"ya",phon:"ya",note:"Root letter ཡ (ya) with inherent vowel 'a': 'ya'. Together ས་མ་ཡ = 'samaya'; with mahā- this gives 'mahāsamaya' = 'great pledge'. The following སཏྭ begins with ས and does not change this syllable's sound."},{tib:"སཏྭ",wylie:"sa twa",phon:"sato",note:"Root letter ས (sa) with ཏ (ta) and ཝ (wa) stacked beneath it, for the cluster 'ttva' of sattva, as in 'Vajrasattva' above. Together 'mahāsamaya-sattva' = 'great pledge-being', a closing epithet of Vajrasattva. The following ཨཱཿ begins with the vowel-carrier ཨ and does not change this syllable's sound."},{tib:"ཨཱཿ",wylie:"AH",phon:"ah",note:"The vowel-carrier letter ཨ (a-chung, used to write a vowel not following a consonant) with the long-vowel sign ཱ and the visarga ཿ — together 'āḥ', a closing seed syllable associated with speech (compare oṃ āḥ hūṃ in the Vajra Guru mantra), sealing the mantra. This is the final syllable of the entire hundred-syllable mantra, so there is no following syllable to affect it."}]}],wordGrouping:"Eighty-one Tibetan syllable-blocks group into the same nine word-units as the Sanskrit word list above: Om-Vajra-Sattva | Samaya-Manupalaya | Vajrasattva-tvenopatiṣṭha-dṛḍho-me-bhava | the three 'me bhava' requests (well-pleased, well-nourished, devoted) | grant-me-all-siddhis / make-my-mind-excellent-hūṃ | ha-ha-ha-ha-hoḥ | Bhagavan-Vajra-of-all-Tathāgatas | do-not-abandon-me | be-the-Vajra-holder-great-pledge-being-āḥ. In practice this mantra is chanted as one continuous flow without pauses between most of these units."}},{id:"yuthok-nyingthig-mantra",title:"Oṃ Āḥ Hūṃ Vajra Guru Yuthok Yönten Gönpo Siddhi Hūṃ",deity:"Yuthok Yönten Gönpo (father of Tibetan medicine, regarded as an emanation of Guru Padmasambhava)",tags:["guru yoga","Tibetan medicine","Yuthok Nyingthig","native Tibetan name"],sanskrit:null,tibetan:{script:"ཨོཾ་ཨཱཿཧཱུྂ་བཛྲ་གུ་རུ་གཡུ་ཐོག་ཡོན་ཏན་མགོན་པོ་སིདྡྷི་ཧཱུྂ།",wylie:"oM AH hU~M badz+ra gu ru g.yu thog yon tan mgon po sid+d+hi hU~M",phonetic:"Om Ah Hung Benza Guru Yutok Yönten Gönpo Siddhi Hung",translation:"Oṃ Āḥ Hūṃ — Vajra Guru Yuthok Yönten Gönpo — grant attainments (siddhi), Hūṃ! A guru-yoga mantra of the Yuthok Nyingthig tradition, invoking Yuthok Yönten Gönpo (the legendary founder of Tibetan medicine) as an emanation of Padmasambhava.",scriptType:"native-tibetan",intro:"This mantra is a hybrid: it opens and closes with the same Sanskrit-spelling blocks as the Vajra Guru mantra (Om Āḥ Hūṃ ... Siddhi Hūṃ), but its centre replaces 'Padma' with the genuinely Tibetan name of Yuthok Yönten Gönpo — 'Yuthok' ('Turquoise Roof', his family name) and 'Yönten Gönpo' ('Glorious/Lordly One of Good Qualities', part of his personal name). These middle syllables follow ordinary Tibetan reading rules (silent prefixes, vowel-fronting before certain suffixes), unlike the Sanskrit-spelling syllables around them.",words:[{script:"ཨོཾ་ཨཱཿཧཱུྂ",wylie:"oM AH hU~M",phon:"Om Ah Hung",gloss:"three seed syllables — body, speech, mind",syllables:[{tib:"ཨོཾ",wylie:"oM",phon:"Om",note:"The vowel-carrier letter ཨ (a-chung) with the vowel sign ོ (o) and the anusvāra ཾ (ṃ), spelling out oṃ syllable-by-syllable rather than with the single Oṃ ligature ༀ — both are read identically, representing the body aspect. The following ཨཱཿ begins with the same vowel-carrier ཨ and has no effect on this syllable's sound."},{tib:"ཨཱཿ",wylie:"AH",phon:"Ah",note:"The bare vowel-carrier letter ཨ (a) with the long-vowel sign ཱ (ā) and the visarga ཿ (two small circles stacked vertically), representing the Sanskrit final -ḥ — a light voiceless aspiration after the vowel. Together: 'āḥ', representing speech. The following ཧཱུྂ begins with ཧ and does not modify this syllable."},{tib:"ཧཱུྂ",wylie:"hU~M",phon:"Hung",note:"Root letter ཧ (ha) + long vowel sign ཱུ (ū) + anusvāra ྂ (ṃ) = 'hūṃ', representing mind, as in Om Mani Padme Hum. The following word begins with བཛྲ, which does not alter this syllable."}]},{script:"བཛྲ་གུ་རུ",wylie:"badz+ra gu ru",phon:"Benza Guru",gloss:"Vajra Guru — 'the Vajra Master/Teacher'",syllables:[{tib:"བཛྲ",wylie:"badz ra",phon:"Benza",note:"Root letter བ (ba) with ཛ (ja/dza) and ྲ (ra) both subjoined, reproducing the Sanskrit consonant cluster 'vajra'. Tibetans pronounce ཛ like 'dz', so the cluster comes out as 'badza/benza' — the familiar Tibetanised 'Benza' for 'Vajra'. The following གུ begins with plain ག and does not change this syllable."},{tib:"གུ",wylie:"gu",phon:"gu",note:"ག (ga) + vowel sign ུ (u) = 'gu'. The following རུ begins with ར and has no effect here."},{tib:"རུ",wylie:"ru",phon:"ru",note:"ར (ra) + vowel sign ུ (u) = 'ru'. Together གུ་རུ = 'guru', 'teacher/master', so བཛྲ་གུ་རུ = 'Vajra Guru'. The following word གཡུ begins a genuinely Tibetan name and does not affect the sound of this syllable."}]},{script:"གཡུ་ཐོག",wylie:"g.yu thog",phon:"Yutok",gloss:"Yuthok — 'Turquoise Roof' (the guru's family name)",syllables:[{tib:"གཡུ",wylie:"g.yu",phon:"yu",note:"A special combination letter: prefix ག written directly over the root letter ཡ (ya), with the vowel sign ུ (u). The prefix ག is silent in modern Central Tibetan pronunciation, but historically it marked this ཡ-syllable as belonging to a different register than a plain ཡ would have — in practice 'g.yu' is simply read 'yu'. Means 'turquoise', the precious stone for which this family/clan was named. The following ཐོག begins with ཐ and does not change this syllable's sound."},{tib:"ཐོག",wylie:"thog",phon:"tok",note:"Root letter ཐ (tha, an aspirate) with the vowel sign ོ (o) and the suffix letter ག (ga). Suffix ག, ད and བ are not released as full consonants in modern speech — they surface as an unreleased final stop, here giving a short final '-k', and they also shorten/clip the preceding vowel, so 'tho' + suffix ག is heard as 'tok' rather than 'thok'. Meaning 'roof'. Together གཡུ་ཐོག = 'Yutok', 'Turquoise Roof' — the family name of Yuthok Yönten Gönpo, the father of Tibetan medicine. This is the final syllable of the word; the following word ཡོན begins with ཡ and does not affect this syllable's sound."}]},{script:"ཡོན་ཏན",wylie:"yon tan",phon:"Yönten",gloss:"yönten — 'good qualities, virtues' (part of the guru's personal name)",syllables:[{tib:"ཡོན",wylie:"yon",phon:"yön",note:"Root letter ཡ (ya) with the vowel sign ོ (o) and the suffix letter ན (na). The suffix ན is pronounced as a final '-n', but it also 'fronts' (umlauts) the preceding vowel: -o followed by suffix ན is regularly heard as '-ön' rather than plain '-on'. So ཡོན is pronounced 'yön', not 'yon'. The following ཏན begins with ཏ and does not change this syllable's sound."},{tib:"ཏན",wylie:"tan",phon:"ten",note:"Root letter ཏ (ta) with its inherent vowel 'a' and the suffix letter ན (na). As with the previous syllable, the suffix ན fronts the vowel: -a + suffix ན is regularly heard as '-en', so ཏན is pronounced 'ten', not 'tan'. Together ཡོན་ཏན = 'yönten', 'good qualities/virtues' — part of the guru's personal name, Yönten Gönpo ('Lord of Good Qualities'). The following word མགོན begins with the silent prefix མ and does not affect this syllable's own sound."}]},{script:"མགོན་པོ",wylie:"mgon po",phon:"Gönpo",gloss:"gönpo — 'lord, protector' (part of the guru's personal name)",syllables:[{tib:"མགོན",wylie:"mgon",phon:"gön",note:"Root letter ག (ga) with the silent prefix letter མ (ma) written above it, the vowel sign ོ (o), and the suffix letter ན (na). The prefix མ is one of the five silent prefix consonants (ག ད བ མ འ) and is not pronounced, but — as with bla-ma above — it can shift the syllable's register; here it keeps the naturally high-register ག from shifting further. The suffix ན again fronts the vowel, so -o + ན is heard as '-ön': མགོན is pronounced 'gön'. The following པོ begins with པ and does not change this syllable's sound."},{tib:"པོ",wylie:"po",phon:"po",note:"Root letter པ (pa) with the vowel sign ོ (o), no prefix or suffix: 'po'. Together མགོན་པོ = 'gönpo', 'lord, protector' — a common honorific epithet (cf. Chenrezig Gönpo). Combined with the previous word, ཡོན་ཏན་མགོན་པོ = 'Yönten Gönpo', '(the) Lord of Good Qualities', the guru's personal name. This is the final syllable of the word; the following word སིདྡྷི begins a return to Sanskrit-spelling mode and does not affect this syllable's sound."}]},{script:"སིདྡྷི",wylie:"sid+d+hi",phon:"Siddhi",gloss:"siddhi — accomplishment/attainment (the request: 'grant siddhi!')",syllables:[{tib:"སིདྡྷི",wylie:"sid+d+hi",phon:"Siddhi",note:"Root letter ས (sa) with vowel sign ི (i), carrying a stack of subjoined ད (da) and ྷ (the aspiration marker producing 'dha' — an aspirated sound foreign to native Tibetan), reproducing the Sanskrit cluster 'ddh' in siddhi. Read 'siddhi'. The closing ཧཱུྂ that follows begins with ཧ and does not change this syllable."}]},{script:"ཧཱུྂ",wylie:"hU~M",phon:"Hung",gloss:"closing seed syllable (hūṃ)",syllables:[{tib:"ཧཱུྂ",wylie:"hU~M",phon:"Hung",note:"= 'hūṃ' again (root ཧ + long ū + anusvāra ṃ), closing the mantra. As the final syllable, there is no following syllable to affect it."}]}],wordGrouping:"Eleven Tibetan syllable-blocks group into seven units: Om | Ah | Hung (body–speech–mind, spelled out letter-by-letter rather than with the Oṃ ligature) | Benza-Guru ('Vajra Guru') | Yutok ('Turquoise Roof', the guru's family name) | Yönten-Gönpo ('Lord of Good Qualities', his personal name) | Siddhi-Hung ('grant attainments now'). The middle three words name Yuthok Yönten Gönpo directly, framed by the same opening/closing formula as the Vajra Guru mantra — reflecting his identity as an emanation of Padmasambhava."}},{id:"lama-khyen-no",title:"Lama Khyen-no (བླ་མ་མཁྱེན་ནོ།)",deity:"General devotional refrain addressed to one's Guru/Lama",tags:["native Tibetan","reading rules","tone & silent letters"],sanskrit:null,tibetan:{script:"བླ་མ་མཁྱེན་ནོ།",wylie:"bla ma mkhyen no",phonetic:"La-ma khyen-no",translation:`"Guru, think of me / know me (care for me)!" — a very common devotional refrain, e.g. in the lines '...la-ma khyen-no, khyen-no, khyen-no' ('Guru, think of me, think of me, think of me').`,scriptType:"native-tibetan",intro:"Unlike the mantras above, this phrase is genuinely Tibetan (not a Sanskrit transcription), so it is a good place to see the ordinary rules for Tibetan syllable structure: every syllable can have, in addition to a root letter and vowel sign, a prefix letter, superscript letter(s), subjoined letter(s), and a suffix (or even a second 'post-suffix') letter — and several of these are silent in modern speech while still shaping the tone and vowel quality of the syllable.",words:[{script:"བླ་མ",wylie:"bla ma",phon:"la-ma",gloss:"blama — 'guru/teacher' (lit. 'the higher one')",syllables:[{tib:"བླ",wylie:"bla",phon:"la (high tone)",note:"Structure: superscript བ (ba) over root letter ལ (la), inherent vowel 'a'. In modern Central Tibetan, a superscript ར, ལ or ས before certain root letters is not pronounced as a separate consonant — but it is NOT 'wasted': it shifts the syllable into HIGH register/tone. ལ on its own is one of the 'low' (voiced/resonant) consonants and would give a low-toned 'la'; with the silent superscript བ, བླ is pronounced 'la' but in a HIGH tone, audibly different from plain ལ. Lexically, 'bla' is an old word for 'soul/highest/upper', seen in bla-ma 'guru' (lit. 'the higher one'). The following syllable མ begins with a plain low-register consonant and does not change this syllable's tone or sound."},{tib:"མ",wylie:"ma",phon:"ma (low tone)",note:"Simple root letter མ with inherent vowel 'a' — no prefix, superscript, subjoined or suffix letters at all. མ is a nasal 'low'-register consonant, so this syllable is pronounced with low tone: 'ma'. Together བླ་མ = 'lama' (high-low), the familiar word for 'guru/teacher'. The following word མཁྱེན begins with a silent prefix མ and does not affect this syllable's own sound."}]},{script:"མཁྱེན",wylie:"mkhyen",phon:"khyen (high tone)",gloss:"knows / thinks of / cares for (honorific verb)",syllables:[{tib:"མཁྱེན",wylie:"mkhyen",phon:"khyen (high tone)",note:"This syllable has four structural slots filled at once: (1) prefix letter མ (ma) — one of the five Tibetan prefix consonants (ག ད བ མ འ); prefixes are silent in modern pronunciation but they push the syllable into HIGH tone regardless of the root letter's own register; (2) root letter ཁ (kha), itself already a high-register consonant; (3) subjoined ྱ (ya-tags) under the root letter, which palatalises 'kha' to 'khya'; (4) vowel sign ེ (e), changing the inherent 'a' to 'e'; (5) suffix letter ན (na), which IS pronounced and closes the syllable with a final 'n'. Net result: silent-prefix(high tone) + khya + e + n = 'khyen', high tone. Meaning: the honorific verb root 'to know/think of/care for'. The following syllable ནོ begins with a plain low-register ན and does not change the sound of this syllable's final -n."}]},{script:"ནོ",wylie:"no",phon:"no (low tone)",gloss:"[petitionary particle — 'please']",syllables:[{tib:"ནོ",wylie:"no",phon:"no (low tone)",note:"Root letter ན (na, a low-register nasal) with the vowel sign ོ (o), no prefix or suffix: 'no', low tone. Functions here as a sentence-final particle giving the verb an imperative/petitionary nuance — roughly 'please do (know me)!'. The final ། mark is simply Tibetan punctuation (a 'shad', equivalent to a full stop). This is the last syllable of the phrase, so there is no following syllable to affect it."}]}],wordGrouping:"Three words across four syllable-blocks: bla-ma ('guru', 2 syllables forming one compound noun) + mkhyen ('knows/cares for', 1 syllable, the verb) + no (1 syllable, a final particle). Sentence pattern: Subject (Guru) + Verb (think-of-me) + Particle (please) — 'Guru, [please] think of me!'. Contrast this with the Sanskrit mantras above: here every silent letter (the prefix མ, the superscript བ) is doing real grammatical/phonological work (raising tone), which is the system that does NOT apply when Tibetan letters are instead used to spell out Sanskrit."}}];function nh({id:e,label:t,sublabel:n,labelClassName:a,openChipId:r,setOpenChipId:i,children:l}){const o=r===e,s=ue.useRef(null),[h,m]=ue.useState(0);return ue.useEffect(()=>{if(!o){m(0);return}const p=s.current;if(!p)return;const f=12,v=p.getBoundingClientRect();let k=0;v.left<f?k=f-v.left:v.right>window.innerWidth-f&&(k=window.innerWidth-f-v.right),m(k)},[o]),w.jsxs("div",{className:"chip-wrap",children:[w.jsxs("button",{type:"button",cla
